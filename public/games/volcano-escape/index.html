<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Volcano Escape - AJ Creator VVIP</title>
    
    <!-- AJ SDK CONNECTED (DO NOT REMOVE) -->
    <script src="../../aj-sdk.js"></script>

    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --lava: #ff4500; --gold: #ffd700; --dark: #0a0500; 
            --neon-blue: #00f2ff; --neon-purple: #bc13fe; --neon-green: #2ecc71; --rock: #8B4513; 
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; color: white; touch-action: none; user-select: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; background: #1a0500; width: 100vw; height: 100vh; }

        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: radial-gradient(circle, #2a0a00 0%, #000 100%); backdrop-filter: blur(25px); text-align: center; padding: 20px; }
        .active-screen { display: flex !important; }

        #splashScreen { position: fixed; inset: 0; background: radial-gradient(circle, #2a0a00 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; }
        .splash-title { font-size: 42px; font-weight: 900; color: var(--lava); text-shadow: 0 0 30px var(--lava); margin-bottom: 10px; font-style: italic; }
        .loading-container { width: 280px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1.5px solid var(--lava); margin-top: 20px; overflow: hidden; }
        .loading-fill { width: 0%; height: 100%; background: var(--lava); box-shadow: 0 0 15px var(--lava); }
        .branding { position: absolute; bottom: 30px; left: 30px; font-size: 16px; color: var(--gold); font-weight: 900; letter-spacing: 3px; }
        
        #hud { position: absolute; top: 20px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; pointer-events: none; }
        .stats { background: rgba(0,0,0,0.8); padding: 12px 25px; border-radius: 50px; border: 1.5px solid var(--lava); box-shadow: 0 0 20px rgba(255,69,0,0.4); }

        .btn { padding: 18px 50px; border: 2px solid #fff; border-radius: 50px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; margin: 10px; width: 280px; font-family: 'Orbitron'; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .btn:hover { transform: scale(1.06) translateY(-3px); filter: brightness(1.2); }
        .btn-red { background: linear-gradient(145deg, #ff4500, #8b0000); box-shadow: 0 0 15px rgba(255, 69, 0, 0.5); }
        .btn-blue { background: linear-gradient(145deg, #00f2ff, #0066ff); box-shadow: 0 0 15px var(--neon-blue); }
        .btn-purple { background: linear-gradient(145deg, #bc13fe, #7a01a3); box-shadow: 0 0 15px var(--neon-purple); }
        .btn-green { background: linear-gradient(145deg, #2ecc71, #27ae60); box-shadow: 0 0 15px var(--neon-green); }
        .btn-gold { background: linear-gradient(145deg, #ffd700, #ff8c00); box-shadow: 0 0 15px var(--gold); color: #000; }
        .btn:disabled { background: #222; border-color: #444; color: var(--neon-blue) !important; text-shadow: 0 0 10px var(--neon-blue); cursor: not-allowed; opacity: 1; }

        .settings-grid { width: 95%; max-width: 500px; display: grid; gap: 15px; }
        .setting-row { background: rgba(255,255,255,0.06); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .setting-control { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: 900; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #333; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { height: 22px; width: 22px; border-radius: 50%; background: var(--lava); cursor: pointer; -webkit-appearance: none; margin-top: -7px; box-shadow: 0 0 10px var(--lava); border: 2px solid white; }

        .garage-container { width: 95%; max-width: 550px; height: 350px; overflow-y: auto; padding: 10px; margin: 15px 0; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .garage-container::-webkit-scrollbar { width: 6px; }
        .garage-container::-webkit-scrollbar-thumb { background: var(--lava); border-radius: 10px; }
        .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .shop-item { padding: 15px 5px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; cursor: pointer; }
        .shop-item.selected { border-color: var(--gold); background: rgba(255,215,0,0.15); box-shadow: 0 0 20px var(--gold); }
        .char-preview { width: 40px; height: 40px; border-radius: 50%; margin: 0 auto; border: 2px solid white; }
        .help-box { background: rgba(255,255,255,0.05); padding: 35px; border-radius: 30px; border: 3px solid var(--gold); text-align: left; width: 90%; max-width: 550px; font-size: 18px; line-height: 1.8; }
    </style>
</head>
<body>

    <div id="splashScreen">
        <div class="splash-title">VOLCANO ESCAPE</div>
        <div class="loading-container"><div id="loadFill" class="loader-fill"></div></div>
        <div class="branding">By AJ Creator</div>
    </div>

    <div id="hud">
        <div class="stats"><div style="font-size:18px; color:var(--gold);"><span id="txt-height">HEIGHT</span>: <span id="heightVal">0</span>M</div></div>
        <div class="stats"><div style="font-size:18px; color:var(--neon-blue);">💎 <span id="crystalVal">0</span> | AJ: <span id="liveAJ">0.000</span></div></div>
    </div>

    <div id="mainMenu" class="screen">
        <h1 style="font-size: 45px; color: var(--lava); text-shadow: 0 0 30px var(--lava); font-style: italic; margin: 0;">VOLCANO ESCAPE</h1>
        <div style="background: rgba(255,255,255,0.05); padding: 10px 40px; border-radius: 50px; border: 2.5px solid var(--gold); margin: 20px 0;">
            <p style="margin: 0; font-weight: bold; color: var(--gold); letter-spacing: 1px;"><span id="txt-best">BEST RECORD</span>: <span id="bestRecord">0</span>M | AJ: <span id="mainAJDisplay">0.000</span></p>
        </div>
        <button class="btn btn-red" onclick="initGameWithAd(); playSfx('click');" id="txt-start">START MISSION</button>
        <button class="btn btn-blue" onclick="openGarage(); playSfx('click');" id="txt-garage">GARAGE</button>
        <button class="btn btn-purple" onclick="openSettings(); playSfx('click');">SETTINGS</button>
        <button class="btn btn-green" onclick="openHowTo(); playSfx('click');">HOW TO PLAY</button>
    </div>

    <div id="settingsScreen" class="screen">
        <h2 style="color: var(--gold); margin-bottom: 20px;">SETTINGS</h2>
        <div class="settings-grid">
            <div class="setting-row">
                <div class="setting-control"><span>MUSIC</span><button class="btn btn-red" style="width:80px; padding:8px; margin:0;" id="mus-toggle" onclick="toggleAudio('music'); playSfx('click');">ON</button></div>
                <input type="range" id="mus-slider" min="0" max="1" step="0.1" oninput="updateVol('music', this.value)">
            </div>
            <div class="setting-row">
                <div class="setting-control"><span>SOUND FX</span><button class="btn btn-red" style="width:80px; padding:8px; margin:0;" id="sfx-toggle" onclick="toggleAudio('sfx'); playSfx('click');">ON</button></div>
                <input type="range" id="sfx-slider" min="0" max="1" step="0.1" oninput="updateVol('sfx', this.value)">
            </div>
            <div class="setting-row">
                <div style="font-weight:900; color:var(--gold); margin-bottom:10px;">LANGUAGES</div>
                <div style="display:flex; flex-wrap:wrap; gap:5px; justify-content:center;">
                    <button class="btn btn-blue" style="width:55px; padding:8px; margin:0; font-size:10px;" onclick="setLang('en');">EN</button>
                    <button class="btn btn-blue" style="width:55px; padding:8px; margin:0; font-size:10px;" onclick="setLang('ru');">RU</button>
                    <button class="btn btn-blue" style="width:55px; padding:8px; margin:0; font-size:10px;" onclick="setLang('ar');">AR</button>
                    <button class="btn btn-blue" style="width:55px; padding:8px; margin:0; font-size:10px;" onclick="setLang('de');">DE</button>
                    <button class="btn btn-blue" style="width:55px; padding:8px; margin:0; font-size:10px;" onclick="setLang('zh');">ZH</button>
                    <button class="btn btn-blue" style="width:55px; padding:8px; margin:0; font-size:10px;" onclick="setLang('ja');">JA</button>
                </div>
            </div>
        </div>
        <button class="btn btn-red" style="margin-top: 25px;" onclick="closeSettings(); playSfx('click');">BACK</button>
    </div>

    <div id="garageScreen" class="screen">
        <h2 style="color: var(--gold); margin: 0;">SURVIVOR DEPOT</h2>
        <p style="font-size: 18px; margin: 10px;">CRYSTALS: <span id="shopCrystals" style="color:var(--neon-blue);">0</span> 💎 | AJ: <span id="garageAJ">0.000</span></p>
        <div class="garage-container"><div class="shop-grid" id="skinGrid"></div></div>
        <button class="btn btn-green" id="adBtn" onclick="watchRewardAdWithSDK(); playSfx('click');">GET FREE CRYSTALS (+20 💎 🎬)</button>
        <button class="btn btn-red" style="margin: 5px;" onclick="closeGarage(); playSfx('click');">BACK</button>
    </div>

    <div id="howToScreen" class="screen">
        <h2 style="color: var(--gold);">HOW TO PLAY</h2>
        <div class="help-box" id="help-text-content"></div>
        <button class="btn btn-red" style="margin-top: 25px;" onclick="closeHowTo(); playSfx('click');">BACK</button>
    </div>

    <div id="gameOver" class="screen">
        <h1 id="deathMsg" style="color: #ff0000; font-size: 50px; font-style: italic; margin:0;">BURIED!</h1>
        <div style="margin: 20px 0;">
           <p style="font-size: 20px; margin: 5px;">HEIGHT: <span id="finalHeight" style="color:var(--gold);">0</span>M</p>
           <p style="font-size: 18px; color:var(--neon-blue);">AJ NET EARN: <span id="finalAJ">0.000</span></p>
        </div>
        <button class="btn btn-red" onclick="initGameWithAd(); playSfx('click');">RETRY</button>
        <button class="btn btn-blue" id="reviveBtn" onclick="watchAdToReviveWithSDK(); playSfx('click');">REVIVE (🎬)</button>
        <button class="btn btn-gold" onclick="goToMainMenu(); playSfx('click');">MENU</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // --- AUDIO SYSTEM ---
    const sounds = {
        bg: new Audio('bg.mp3'), click: new Audio('click.mp3'), crystal: new Audio('crystalspickup.mp3'),
        jump: new Audio('jump.mp3'), lavaBg: new Audio('lavabg.mp3'), splash: new Audio('lavasplash.mp3'), crash: new Audio('rockcrash.mp3')
    };
    sounds.bg.loop = true; sounds.lavaBg.loop = true;
    function playSfx(key) { if(audioState.sfxOn && sounds[key]) { sounds[key].volume = audioState.sfxVol; sounds[key].currentTime = 0; sounds[key].play().catch(()=>{}); } }

    // Splash
    let lp = 0;
    const lIv = setInterval(() => {
        lp += 2.5; document.getElementById('loadFill').style.width = lp + "%";
        if(lp >= 100) { clearInterval(lIv); document.getElementById('splashScreen').style.display='none'; document.getElementById('mainMenu').classList.add('active-screen'); updateUIDisplays(); }
    }, 40);

    // --- DATA SAVER & STATE ---
    let bestScore = parseInt(localStorage.getItem('volcano_best')) || 0;
    let totalCrystals = parseInt(localStorage.getItem('volcano_crystals')) || 0;
    let unlockedChars = JSON.parse(localStorage.getItem('volcano_unlocked')) || [0];
    let currentChar = parseInt(localStorage.getItem('volcano_char')) || 0;
    let lastAdTime = parseInt(localStorage.getItem('volcano_ad_time')) || 0;
    let audioState = JSON.parse(localStorage.getItem('v_audio')) || { musOn: true, sfxOn: true, musVol: 0.5, sfxVol: 0.7 };
    let canRevive = true;
    let isPaused = false;

    const langData = {
        en: { start: "START MISSION", garage: "GARAGE", help: "HOW TO PLAY", best: "BEST RECORD", height: "HEIGHT", help_txt: "1. <b>TAP</b> rocks to jump up.<br>2. Row can have 1-3 rocks. Only <b>ONE</b> is safe!<br>3. <b>TRAPS:</b> Break in 0.1s! Watch for subtle cracks.<br>4. <span style='color:cyan'>Collect Crystals</span> to buy 50+ Survivors in Garage!<br>5. Escape the lava!" },
        ru: { start: "ИГРАТЬ", garage: "ГАРАЖ", help: "ПОМОЩЬ", best: "РЕКОРД", height: "ВЫСОТА", help_txt: "1. Прыгайте по скалам.<br>2. Только ОДНА скала безопасna.<br>3. ЛОВУШКИ ломаются быстро!<br>4. Собирайте кристаллы!<br>5. Бегите от лавы!" }
    };

    function setLang(code) {
        localStorage.setItem('volcano_lang', code);
        const d = langData[code] || langData['en'];
        document.getElementById('txt-start').innerText = d.start; document.getElementById('txt-garage').innerText = d.garage;
        document.getElementById('txt-best').innerText = d.best; document.getElementById('txt-height').innerText = d.height;
        document.getElementById('help-text-content').innerHTML = d.help_txt;
    }

    const characters = [];
    for(let i=0; i<50; i++) {
        let price = i === 0 ? 0 : 1000 + (i - 1) * 500;
        let hue = (i * 137.5) % 360; 
        characters.push({ id: i, name: i === 0 ? "CLASSIC" : "UNIT " + (i+1), price: price, color: `hsl(${hue}, 100%, 50%)` });
    }

    function renderGarage() {
        const grid = document.getElementById('skinGrid'); grid.innerHTML = "";
        document.getElementById('shopCrystals').innerText = totalCrystals;
        document.getElementById('garageAJ').innerText = (totalCrystals * 0.003).toFixed(3);
        characters.forEach(char => {
            const item = document.createElement('div');
            item.className = `shop-item ${currentChar === char.id ? 'selected' : ''}`;
            item.onclick = () => { selectChar(char.id); playSfx('click'); };
            const isUnlocked = unlockedChars.includes(char.id);
            let status = isUnlocked ? (currentChar === char.id ? "EQUIPPED" : "SELECT") : char.price + " 💎";
            item.innerHTML = `<div class="char-preview" style="background:${char.color};"></div><b>${char.name}</b><br><small>${status}</small>`;
            grid.appendChild(item);
        });
    }

    function selectChar(id) {
        const char = characters[id];
        if (unlockedChars.includes(id)) {
            currentChar = id;
            localStorage.setItem('volcano_char', currentChar);
            renderGarage();
        } else if (totalCrystals >= char.price) { 
            if(window.AJ_SDK) window.AJ_SDK.showAd(); 
            setTimeout(() => {
                totalCrystals -= char.price; 
                unlockedChars.push(id); 
                currentChar = id; 
                localStorage.setItem('volcano_crystals', totalCrystals); 
                localStorage.setItem('volcano_unlocked', JSON.stringify(unlockedChars)); 
                localStorage.setItem('volcano_char', currentChar);
                syncWithPortal();
                updateUIDisplays();
                renderGarage();
            }, 1500);
        } else { alert("Need more crystals!"); }
    }

    function toggleAudio(type) { if(type === 'music') audioState.musOn = !audioState.musOn; else audioState.sfxOn = !audioState.sfxOn; localStorage.setItem('v_audio', JSON.stringify(audioState)); updateAudioUI(); if(!audioState.musOn){ sounds.bg.pause(); sounds.lavaBg.pause(); } }
    function updateAudioUI() { document.getElementById('mus-toggle').innerText = audioState.musOn ? "ON" : "OFF"; document.getElementById('sfx-toggle').innerText = audioState.sfxOn ? "ON" : "OFF"; document.getElementById('mus-slider').value = audioState.musVol; document.getElementById('sfx-slider').value = audioState.sfxVol; }
    function updateVol(type, val) { if(type === 'music') { audioState.musVol = parseFloat(val); sounds.bg.volume = audioState.musOn ? audioState.musVol : 0; sounds.lavaBg.volume = audioState.musOn ? audioState.musVol : 0; } else audioState.sfxVol = parseFloat(val); localStorage.setItem('v_audio', JSON.stringify(audioState)); }
    function openSettings() { document.getElementById('mainMenu').classList.remove('active-screen'); document.getElementById('settingsScreen').classList.add('active-screen'); updateAudioUI(); }
    function closeSettings() { document.getElementById('settingsScreen').classList.remove('active-screen'); document.getElementById('mainMenu').classList.add('active-screen'); }
    function openHowTo() { document.getElementById('mainMenu').classList.remove('active-screen'); document.getElementById('howToScreen').classList.add('active-screen'); }
    function closeHowTo() { document.getElementById('howToScreen').classList.remove('active-screen'); document.getElementById('mainMenu').classList.add('active-screen'); }
    function openGarage() { document.getElementById('mainMenu').classList.remove('active-screen'); document.getElementById('garageScreen').classList.add('active-screen'); renderGarage(); updateUIDisplays(); }
    function closeGarage() { document.getElementById('garageScreen').classList.remove('active-screen'); document.getElementById('mainMenu').classList.add('active-screen'); }
    function goToMainMenu() { document.getElementById('gameOver').classList.remove('active-screen'); document.getElementById('mainMenu').classList.add('active-screen'); document.getElementById('hud').style.display = 'none'; gameActive = false; sounds.bg.pause(); sounds.lavaBg.pause(); updateUIDisplays(); }

    setInterval(() => {
        const btn = document.getElementById('adBtn');
        const diff = Date.now() - lastAdTime;
        if(diff < 86400000) { btn.disabled = true; let rem = 86400000 - diff; let h = Math.floor(rem/3600000), m = Math.floor((rem%3600000)/60000), s = Math.floor((rem%60000)/1000); btn.innerText = `LOCKED (${h}h ${m}m ${s}s)`; }
        else { btn.disabled = false; btn.innerText = "GET FREE CRYSTALS (+20 💎 🎬)"; }
    }, 1000);

    function watchRewardAdWithSDK() {
        if(window.AJ_SDK) {
            window.AJ_SDK.showAd();
            setTimeout(() => {
                totalCrystals = parseInt(totalCrystals) + 20; 
                lastAdTime = Date.now(); 
                localStorage.setItem('volcano_crystals', totalCrystals); 
                localStorage.setItem('volcano_ad_time', lastAdTime); 
                syncWithPortal(); 
                updateUIDisplays();
                renderGarage();
                alert("Success! 20 Free Crystals Added.");
            }, 2000);
        } else { alert("Ad not available."); }
    }

    function watchAdToReviveWithSDK() {
        if(window.AJ_SDK) {
            window.AJ_SDK.showAd(); 
            setTimeout(() => { revivePlayer(); }, 1000);
        } else { alert("Ad not available."); }
    }

    function initGameWithAd() {
        if(window.AJ_SDK) window.AJ_SDK.showAd(); 
        initGame();
    }

    function updateUIDisplays() {
        const ajVal = (totalCrystals * 0.003).toFixed(3);
        if(document.getElementById('bestRecord')) document.getElementById('bestRecord').innerText = bestScore;
        if(document.getElementById('mainAJDisplay')) document.getElementById('mainAJDisplay').innerText = ajVal;
        if(document.getElementById('shopCrystals')) document.getElementById('shopCrystals').innerText = totalCrystals;
        if(document.getElementById('garageAJ')) document.getElementById('garageAJ').innerText = ajVal;
        if(document.getElementById('crystalVal')) document.getElementById('crystalVal').innerText = totalCrystals;
        if(document.getElementById('liveAJ')) document.getElementById('liveAJ').innerText = ajVal;
    }

    function syncWithPortal() {
        if(window.AJ_SDK) {
            window.AJ_SDK.addBalance({
                game_coins: totalCrystals,
                aj_net: (totalCrystals * 0.003),
                source: "Volcano Escape Sync"
            });
        }
    }

    // --- FIXED REVIVE PLAYER ---
    function revivePlayer() { 
        canRevive = false; 
        player.isDead = false; 
        player.opacity = 1; 
        player.scale = 1; // RESET SCALE TO 1 (Normal size)
        player.grounded = false; // DON'T SNAP TO BOTTOM ROCK
        player.isJumping = false;

        // Reset the current rock player is on so it doesn't fall again
        if(player.currentRock) {
            player.currentRock.timer = 0;
            player.currentRock.falling = false;
            player.currentRock.active = false;
            player.currentRock.fallY = 0;
            player.currentRock.opacity = 1;
        }

        // Push lava way back from player
        lavaY = player.y + 600; 

        gameActive = true; 
        document.getElementById('gameOver').classList.remove('active-screen'); 
        document.getElementById('hud').style.display = 'flex'; 
        if(audioState.musOn){ sounds.bg.play().catch(()=>{}); sounds.lavaBg.play().catch(()=>{}); } 
        loop(); 
        updateUIDisplays();
    }

    let gameActive = false, score = 0, cameraY = 0, lavaY = 0, frame = 0, rocks = [];
    let player = { x: 0, y: 0, targetX: 0, targetY: 0, size: 42, scale: 1, opacity: 1, isJumping: false, isDead: false, currentRock: null, grounded: true };

    class Rock {
        constructor(x, y, isSafe = false, isTrap = false, limit = 4.0) {
            this.x = x; this.y = y; this.w = 95; this.h = 45;
            this.timer = 0; this.active = false; this.falling = false;
            this.isSafe = isSafe; this.isTrap = isTrap;
            this.timerLimit = isTrap ? 0.1 : limit;
            this.hasCrystal = !isSafe && (isTrap ? Math.random() < 0.6 : Math.random() < 0.15);
            this.fallY = 0; this.opacity = 1; this.crashPlayed = false;
        }
        update() {
            if(this.active && !this.isSafe && !this.falling) {
                this.timer += 1/60;
                if(this.timer > this.timerLimit) { this.falling = true; if(!this.crashPlayed) { playSfx('crash'); this.crashPlayed = true; } if(player.currentRock === this) player.isDead = true; }
            }
            if(this.falling) { this.fallY += 15; this.opacity -= 0.02; if(player.currentRock === this) { player.y += 15; player.scale -= 0.02; } }
        }
        draw(cOffset) {
            if(this.opacity <= 0) return;
            ctx.save();
            let sx = (this.active && !this.isSafe && this.timer > (this.timerLimit * 0.6) && !this.falling) ? (Math.random()-0.5) * 12 : 0;
            ctx.translate(this.x + sx, this.y + cOffset + this.fallY);
            ctx.globalAlpha = this.opacity;
            let rG = ctx.createLinearGradient(0, -this.h/2, 0, this.h/2); rG.addColorStop(0, "#8B4513"); rG.addColorStop(1, "#5D4037");
            ctx.fillStyle = this.isSafe ? "#8B4513" : (this.active && !this.falling ? "#ff3300" : rG);
            ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
            ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
            if(this.hasCrystal && !this.falling) {
                ctx.fillStyle = "#00f2ff"; ctx.shadowBlur = 15; ctx.shadowColor = "cyan";
                ctx.beginPath(); ctx.moveTo(0, -35); ctx.lineTo(8, -25); ctx.lineTo(0, -15); ctx.lineTo(-8, -25); ctx.closePath(); ctx.fill();
                ctx.shadowBlur = 0;
            }
            if(this.isTrap && !this.isSafe && !this.falling) { ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(-20,-10); ctx.lineTo(15,8); ctx.stroke(); }
            ctx.restore();
        }
    }

    function initGame() {
        startGame();
    }

    function startGame() {
        gameActive = true; rocks = []; score = 0; cameraY = 0; frame = 0; lavaY = canvas.height + 400; canRevive = true; isPaused = false;
        let sR = new Rock(canvas.width / 2, canvas.height - 150, true); rocks.push(sR);
        for(let i=1; i<15; i++) spawnRow(canvas.height - 150 - (i * 240));
        player = { x: sR.x, y: sR.y - 50, targetX: sR.x, targetY: sR.y - 50, vx: 0, vy: 0, size: 42, scale: 1, opacity: 1, isJumping: false, isDead: false, currentRock: sR, grounded: true };
        document.getElementById('mainMenu').classList.remove('active-screen'); document.getElementById('gameOver').classList.remove('active-screen');
        document.getElementById('hud').style.display = 'flex'; 
        if(audioState.musOn){ sounds.bg.play().catch(()=>{}); sounds.lavaBg.play().catch(()=>{}); } 
        loop();
        updateUIDisplays();
    }

    function spawnRow(y) {
        let cH = Math.floor(Math.abs(y - (canvas.height - 150)) / 15);
        let limit = 4.0;
        if (cH > 2500) limit = 2.0; else if (cH > 1000) limit = 3.0;
        let rC = Math.floor(Math.random() * 3) + 1;
        let sI = Math.floor(Math.random() * rC);
        for(let i=0; i<rC; i++) { let sp = canvas.width / (rC + 1); rocks.push(new Rock(sp * (i + 1), y, false, (i !== sI), limit)); }
    }

    function handleAction(cX, cY) {
        if (!gameActive || isPaused || player.isJumping || player.isDead) return;
        const rect = canvas.getBoundingClientRect();
        const tx = (cX - rect.left) * (canvas.width / rect.width);
        const ty = (cY - rect.top) * (canvas.height / rect.height) - cameraY;
        let closest = null, minDist = 120;
        rocks.forEach(r => { let d = Math.sqrt(Math.pow(tx - r.x, 2) + Math.pow(ty - r.y, 2)); if(d < minDist && !r.falling) { minDist = d; closest = r; } });
        if(closest) {
            if (Math.sqrt(Math.pow(closest.x - player.x, 2) + Math.pow(closest.y - player.y, 2)) < 550) {
                if (closest.hasCrystal) { 
                    closest.hasCrystal = false; 
                    totalCrystals = parseInt(totalCrystals) + 1; 
                    playSfx('crystal'); 
                    syncWithPortal(); 
                    updateUIDisplays(); 
                }
                player.grounded = false; player.isJumping = true; player.targetX = closest.x; player.targetY = closest.y - 50;
                if(player.currentRock) player.currentRock.active = false;
                player.currentRock = closest; closest.active = true; playSfx('jump');
            }
        }
    }

    canvas.addEventListener('mousedown', (e) => handleAction(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(e.touches[0].clientX, e.touches[0].clientY); });

    function update() {
        if(!gameActive || isPaused) return;
        frame++; 
        lavaY -= 1.15; 
        if(player.isDead && player.scale <= 0.1) endGame();
        if(player.grounded) { player.x = rocks[0].x; player.y = rocks[0].y - 50; }
        else if(player.isJumping && !player.isDead) {
            player.x += (player.targetX - player.x) * 0.18; player.y += (player.targetY - player.y) * 0.18;
            if(Math.abs(player.targetX-player.x)<5 && Math.abs(player.targetY-player.y)<5) player.isJumping = false;
        }
        if(player.y + cameraY >= lavaY + cameraY) { playSfx('splash'); endGame(); }
        cameraY += (-player.y + canvas.height * 0.6 - cameraY) * 0.12;
        score = Math.max(score, Math.floor(Math.abs(player.y - (canvas.height-150))/15));
        if (score > bestScore) { bestScore = score; localStorage.setItem('volcano_best', bestScore); updateUIDisplays(); }
        document.getElementById('heightVal').innerText = score; 
        updateUIDisplays();
        rocks.forEach(r => r.update());
        if(rocks[rocks.length-1].y > player.y - canvas.height) spawnRow(rocks[rocks.length-1].y - 250);
        if(player.y + cameraY > canvas.height + 400) endGame();
    }

    function draw() {
        ctx.fillStyle = "#110500"; ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(0, cameraY);
        rocks.forEach(r => r.draw(0));
        ctx.save(); ctx.translate(player.x, player.y); ctx.scale(Math.max(0.1, player.scale), Math.max(0.1, player.scale)); ctx.globalAlpha = Math.max(0, player.opacity);
        ctx.fillStyle = characters[currentChar].color; ctx.shadowBlur = 15; ctx.shadowColor = characters[currentChar].color;
        ctx.beginPath(); ctx.arc(0,0, player.size/2, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
        ctx.restore();
        ctx.fillStyle = "rgba(255, 60, 0, 0.95)"; ctx.shadowBlur = 30; ctx.shadowColor = "red";
        ctx.fillRect(-100, lavaY, canvas.width+200, 3000);
        ctx.restore();
    }

    function endGame() {
        if(window.AJ_SDK) window.AJ_SDK.showAd(); 
        gameActive = false; if(typeof sounds !== 'undefined'){ sounds.bg.pause(); sounds.lavaBg.pause(); }
        document.getElementById('finalHeight').innerText = score;
        document.getElementById('finalAJ').innerText = (totalCrystals * 0.003).toFixed(3);
        document.getElementById('reviveBtn').style.display = canRevive ? "block" : "none";
        document.getElementById('gameOver').classList.add('active-screen'); document.getElementById('hud').style.display = 'none';
        localStorage.setItem('volcano_crystals', totalCrystals);
        syncWithPortal();
        updateUIDisplays();
    }

    function loop() { if (gameActive) { update(); draw(); requestAnimationFrame(loop); } }
    setLang(localStorage.getItem('volcano_lang') || 'en');
    updateUIDisplays();
</script>
</body>
