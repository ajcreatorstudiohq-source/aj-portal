<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volcano Escape - AJ Super Jumper</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background-color: #030100;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 800px;
      background: linear-gradient(180deg, #180500 0%, #030100 100%);
      border: 2px solid #ea580c;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(234, 88, 12, 0.3);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(234, 88, 12, 0.2);
      background: rgba(234, 88, 12, 0.05);
    }
    h1 {
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #f97316;
      text-shadow: 0 0 10px #f97316;
    }
    #canvas-container {
      flex: 1;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(3, 1, 0, 0.85);
      z-index: 10;
    }
    .hidden {
      display: none !important;
    }
    button {
      background: linear-gradient(135deg, #ea580c 0%, #dc2626 100%);
      color: #fff;
      border: none;
      padding: 12px 35px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(234, 88, 12, 0.5);
      margin-top: 20px;
    }
    button:active {
      transform: scale(0.95);
    }
    #score-board {
      font-size: 14px;
      color: #fbbf24;
      text-shadow: 0 0 8px #fbbf24;
      margin-top: 10px;
    }
    #instructions {
      font-size: 11px;
      color: #888;
      margin-top: 15px;
      text-align: center;
      padding: 0 20px;
      line-height: 1.5;
    }
    #mobile-controls {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
      border-top: 1px solid rgba(234, 88, 12, 0.2);
    }
    .control-btn {
      width: 80px;
      height: 60px;
      border-radius: 12px;
      background: rgba(234, 88, 12, 0.1);
      border: 1px solid #ea580c;
      color: #ea580c;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .control-btn:active {
      background: #ea580c;
      color: #000;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <header>
      <h1>VOLCANO ESCAPE</h1>
      <div id="score-board">ALTITUDE: <span id="current-score">0</span>m</div>
    </header>

    <div id="canvas-container">
      <canvas id="gameCanvas"></canvas>

      <div id="ui-overlay">
        <h2 id="menu-title" style="color: #f97316; text-shadow: 0 0 10px #f97316; text-transform: uppercase; letter-spacing: 2px;">Eruption Alert</h2>
        <p id="menu-desc" style="font-size: 12px; margin-top: 10px; color: #aaa;">Bounce upwards on rock ledges to survive!</p>
        <button id="action-btn">Escape Now</button>
        <p id="instructions">Use [A]/[D] or Left/Right arrows, or the on-screen arrows to steer the hopper onto safe platforms.</p>
      </div>
    </div>

    <div id="mobile-controls">
      <div class="control-btn" id="left-btn">◀</div>
      <div class="control-btn" id="right-btn">▶</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('current-score');
    const uiOverlay = document.getElementById('ui-overlay');
    const actionBtn = document.getElementById('action-btn');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');
    const menuTitle = document.getElementById('menu-title');
    const menuDesc = document.getElementById('menu-desc');

    function resize() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let playing = false;
    let player = {
      x: 150,
      y: 400,
      width: 20,
      height: 20,
      gravity: 0.3,
      jumpForce: -9,
      velocity: 0
    };
    let platforms = [];
    const platformWidth = 65;
    const platformHeight = 12;

    function sendScoreToPortal(score) {
      if (window.parent) {
        window.parent.postMessage({
          type: 'GAME_SCORE',
          score: score,
          coinsEarned: score * 0.010
        }, '*');
      }
    }

    function init() {
      score = 0;
      player.x = canvas.width / 2;
      player.y = canvas.height - 150;
      player.velocity = player.jumpForce;
      scoreVal.textContent = '0';

      // Generate initial platforms
      platforms = [];
      platforms.push({ x: canvas.width / 2 - platformWidth / 2, y: canvas.height - 100 });
      for (let i = 1; i < 7; i++) {
        platforms.push({
          x: Math.random() * (canvas.width - platformWidth),
          y: canvas.height - 100 - (i * 100)
        });
      }
    }

    let leftPressed = false;
    let rightPressed = false;

    // Controls
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') leftPressed = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rightPressed = true;
    });
    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') leftPressed = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rightPressed = false;
    });

    leftBtn.addEventListener('mousedown', () => leftPressed = true);
    leftBtn.addEventListener('mouseup', () => leftPressed = false);
    leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftPressed = true; });
    leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); leftPressed = false; });

    rightBtn.addEventListener('mousedown', () => rightPressed = true);
    rightBtn.addEventListener('mouseup', () => rightPressed = false);
    rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightPressed = true; });
    rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); rightPressed = false; });

    actionBtn.addEventListener('click', () => {
      init();
      playing = true;
      uiOverlay.classList.add('hidden');
      loop();
    });

    function gameOver() {
      playing = false;
      uiOverlay.classList.remove('hidden');
      menuTitle.textContent = "Lava Caught You!";
      menuDesc.textContent = `Escaped height: ${score}m (+${(score * 0.010).toFixed(2)} Coins)`;
      actionBtn.textContent = "Escape Again";
      sendScoreToPortal(score);
    }

    function loop() {
      if (!playing) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Steer player
      if (leftPressed) player.x -= 4;
      if (rightPressed) player.x += 4;

      // Wrap boundaries
      if (player.x < 0) player.x = canvas.width - player.width;
      if (player.x > canvas.width) player.x = 0;

      // Player jumping physics
      player.velocity += player.gravity;
      player.y += player.velocity;

      // Camera shift: when player goes above center screen, push everything down
      if (player.y < canvas.height / 2) {
        const diff = canvas.height / 2 - player.y;
        player.y = canvas.height / 2;
        score += Math.round(diff);
        scoreVal.textContent = score;

        platforms.forEach(plat => {
          plat.y += diff;
        });
      }

      // Out of bounds - fallen into hot lava!
      if (player.y > canvas.height) {
        gameOver();
        return;
      }

      // Draw Rising Lava Alert effect at bottom
      ctx.fillStyle = 'rgba(239, 68, 68, 0.15)';
      ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

      // Draw platforms
      platforms.forEach((plat, idx) => {
        ctx.fillStyle = '#f97316';
        ctx.shadowColor = '#ea580c';
        ctx.shadowBlur = 10;
        ctx.fillRect(plat.x, plat.y, platformWidth, platformHeight);

        // Platform collision with player (only when landing downwards)
        if (
          player.velocity > 0 &&
          player.x < plat.x + platformWidth &&
          player.x + player.width > plat.x &&
          player.y + player.height >= plat.y &&
          player.y + player.height <= plat.y + platformHeight + 4
        ) {
          player.velocity = player.jumpForce;
        }

        // Respawn platforms if they fall out of viewport
        if (plat.y > canvas.height) {
          platforms[idx] = {
            x: Math.random() * (canvas.width - platformWidth),
            y: plat.y - canvas.height
          };
        }
      });

      // Draw Player (Glowing Neon Golden Sphere/Box)
      ctx.fillStyle = '#fbbf24';
      ctx.shadowColor = '#f59e0b';
      ctx.shadowBlur = 15;
      ctx.fillRect(player.x, player.y, player.width, player.height);

      ctx.shadowBlur = 0;
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
