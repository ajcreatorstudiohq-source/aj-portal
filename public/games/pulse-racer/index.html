<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Racer - AJ Super Arcade</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background-color: #050505;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 800px;
      background: linear-gradient(180deg, #0b001a 0%, #03000a 100%);
      border: 2px solid #ff007f;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 0, 127, 0.2);
      background: rgba(255, 0, 127, 0.05);
    }
    h1 {
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #ff007f;
      text-shadow: 0 0 10px #ff007f;
    }
    #canvas-container {
      flex: 1;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 5, 5, 0.85);
      z-index: 10;
    }
    .hidden {
      display: none !important;
    }
    button {
      background: linear-gradient(135deg, #ff007f 0%, #7000ff 100%);
      color: #fff;
      border: none;
      padding: 12px 35px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
      margin-top: 20px;
    }
    button:active {
      transform: scale(0.95);
    }
    #score-board {
      font-size: 14px;
      color: #00f0ff;
      text-shadow: 0 0 8px #00f0ff;
      margin-top: 10px;
    }
    #instructions {
      font-size: 11px;
      color: #888;
      margin-top: 15px;
      text-align: center;
      padding: 0 20px;
      line-height: 1.5;
    }
    #mobile-controls {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
      border-top: 1px solid rgba(0, 240, 255, 0.2);
    }
    .control-btn {
      width: 80px;
      height: 60px;
      border-radius: 12px;
      background: rgba(255, 0, 127, 0.1);
      border: 1px solid #ff007f;
      color: #ff007f;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .control-btn:active {
      background: #ff007f;
      color: #000;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <header>
      <h1>PULSE RACER</h1>
      <div id="score-board">DISTANCE: <span id="current-score">0</span>m</div>
    </header>

    <div id="canvas-container">
      <canvas id="gameCanvas"></canvas>

      <div id="ui-overlay">
        <h2 id="menu-title" style="color: #00f0ff; text-shadow: 0 0 10px #00f0ff; text-transform: uppercase; letter-spacing: 2px;">Ignition</h2>
        <p id="menu-desc" style="font-size: 12px; margin-top: 10px; color: #aaa;">Speed down the pulsing cyber-highway!</p>
        <button id="action-btn">Race Now</button>
        <p id="instructions">Use [A]/[D] or Left/Right arrows, or the on-screen buttons to dodge incoming red roadblocks.</p>
      </div>
    </div>

    <div id="mobile-controls">
      <div class="control-btn" id="left-btn">◀</div>
      <div class="control-btn" id="right-btn">▶</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('current-score');
    const uiOverlay = document.getElementById('ui-overlay');
    const actionBtn = document.getElementById('action-btn');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');
    const menuTitle = document.getElementById('menu-title');
    const menuDesc = document.getElementById('menu-desc');

    function resize() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let playing = false;
    let racerX = 150;
    const racerWidth = 40;
    const racerHeight = 65;
    let roadLines = [];
    let roadblocks = [];
    let roadSpeed = 6;
    let obstacleTimer = 0;

    function sendScoreToPortal(score) {
      if (window.parent) {
        window.parent.postMessage({
          type: 'GAME_SCORE',
          score: score,
          coinsEarned: score * 0.010
        }, '*');
      }
    }

    function init() {
      score = 0;
      roadblocks = [];
      racerX = (canvas.width - racerWidth) / 2;
      roadSpeed = 6;
      obstacleTimer = 0;
      scoreVal.textContent = '0';
      
      roadLines = [];
      for (let i = 0; i < canvas.height; i += 80) {
        roadLines.push(i);
      }
    }

    let leftPressed = false;
    let rightPressed = false;

    // Controls
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') leftPressed = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rightPressed = true;
    });
    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') leftPressed = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rightPressed = false;
    });

    leftBtn.addEventListener('mousedown', () => leftPressed = true);
    leftBtn.addEventListener('mouseup', () => leftPressed = false);
    leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftPressed = true; });
    leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); leftPressed = false; });

    rightBtn.addEventListener('mousedown', () => rightPressed = true);
    rightBtn.addEventListener('mouseup', () => rightPressed = false);
    rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightPressed = true; });
    rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); rightPressed = false; });

    actionBtn.addEventListener('click', () => {
      init();
      playing = true;
      uiOverlay.classList.add('hidden');
      loop();
    });

    function gameOver() {
      playing = false;
      uiOverlay.classList.remove('hidden');
      menuTitle.textContent = "Engine Blown!";
      menuDesc.textContent = `Completed ${score}m (+${(score * 0.010).toFixed(2)} Coins)`;
      actionBtn.textContent = "Restart Engine";
      sendScoreToPortal(score);
    }

    function loop() {
      if (!playing) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Move player
      if (leftPressed && racerX > 20) racerX -= 5;
      if (rightPressed && racerX < canvas.width - racerWidth - 20) racerX += 5;

      // Draw road margins
      ctx.strokeStyle = '#ff007f';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(15, 0); ctx.lineTo(15, canvas.height);
      ctx.moveTo(canvas.width - 15, 0); ctx.lineTo(canvas.width - 15, canvas.height);
      ctx.stroke();

      // Draw highway lines
      ctx.strokeStyle = 'rgba(0, 240, 255, 0.4)';
      ctx.lineWidth = 2;
      ctx.setLineDash([30, 30]);
      for (let i = 0; i < roadLines.length; i++) {
        roadLines[i] += roadSpeed;
        if (roadLines[i] > canvas.height) roadLines[i] = 0;
        
        ctx.beginPath();
        ctx.moveTo(canvas.width / 3, roadLines[i]);
        ctx.lineTo(canvas.width / 3, roadLines[i] + canvas.height);
        ctx.moveTo((canvas.width / 3) * 2, roadLines[i]);
        ctx.lineTo((canvas.width / 3) * 2, roadLines[i] + canvas.height);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      // Draw Racer Car
      ctx.fillStyle = '#00f0ff';
      ctx.shadowColor = '#00f0ff';
      ctx.shadowBlur = 15;
      ctx.fillRect(racerX, canvas.height - 100, racerWidth, racerHeight);
      
      // Car details
      ctx.fillStyle = '#fff';
      ctx.fillRect(racerX + 5, canvas.height - 90, 8, 15);
      ctx.fillRect(racerX + racerWidth - 13, canvas.height - 90, 8, 15);

      // Obstacle management
      obstacleTimer++;
      if (obstacleTimer > 70) {
        const lane = Math.floor(Math.random() * 3);
        const obstacleWidth = 50;
        const oX = 25 + lane * ((canvas.width - 70) / 3);
        roadblocks.push({
          x: oX,
          y: -80,
          width: obstacleWidth,
          height: 30
        });
        obstacleTimer = 0;
      }

      for (let i = roadblocks.length - 1; i >= 0; i--) {
        let block = roadblocks[i];
        block.y += roadSpeed;

        ctx.fillStyle = '#ff007f';
        ctx.shadowColor = '#ff007f';
        ctx.shadowBlur = 10;
        ctx.fillRect(block.x, block.y, block.width, block.height);

        // Crash check
        if (
          racerX < block.x + block.width &&
          racerX + racerWidth > block.x &&
          canvas.height - 100 < block.y + block.height &&
          canvas.height - 100 + racerHeight > block.y
        ) {
          gameOver();
          return;
        }

        if (block.y > canvas.height) {
          roadblocks.splice(i, 1);
          score += 10;
          scoreVal.textContent = score;
          if (score % 60 === 0) roadSpeed += 0.5;
        }
      }

      ctx.shadowBlur = 0;
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
