<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subsea Surge - Deep Underwater Arcade</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background-color: #020617;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 800px;
      background: linear-gradient(180deg, #021526 0%, #010409 100%);
      border: 2px solid #38bdf8;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(56, 189, 248, 0.2);
      background: rgba(56, 189, 248, 0.05);
    }
    h1 {
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #38bdf8;
      text-shadow: 0 0 10px #38bdf8;
    }
    #canvas-container {
      flex: 1;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.85);
      z-index: 10;
    }
    .hidden {
      display: none !important;
    }
    button {
      background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
      color: #000;
      border: none;
      padding: 12px 35px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
      margin-top: 20px;
    }
    button:active {
      transform: scale(0.95);
    }
    #score-board {
      font-size: 14px;
      color: #fb7185;
      text-shadow: 0 0 8px #fb7185;
      margin-top: 10px;
    }
    #instructions {
      font-size: 11px;
      color: #888;
      margin-top: 15px;
      text-align: center;
      padding: 0 20px;
      line-height: 1.5;
    }
    #mobile-controls {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
      border-top: 1px solid rgba(56, 189, 248, 0.2);
    }
    .control-btn {
      width: 100%;
      max-width: 250px;
      height: 60px;
      border-radius: 30px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid #38bdf8;
      color: #38bdf8;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .control-btn:active {
      background: #38bdf8;
      color: #000;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <header>
      <h1>SUBSEA SURGE</h1>
      <div id="score-board">DEPTH TRACKER: <span id="current-score">0</span>m</div>
    </header>

    <div id="canvas-container">
      <canvas id="gameCanvas"></canvas>

      <div id="ui-overlay">
        <h2 id="menu-title" style="color: #38bdf8; text-shadow: 0 0 10px #38bdf8; text-transform: uppercase; letter-spacing: 2px;">Dive Deep</h2>
        <p id="menu-desc" style="font-size: 12px; margin-top: 10px; color: #aaa;">Propel your sub through deep sea obstacles!</p>
        <button id="action-btn">Dive Now</button>
        <p id="instructions">Press & hold [SPACE], click/tap the screen, or hold down the "PROPEL" button to rise. Release to dive.</p>
      </div>
    </div>

    <div id="mobile-controls">
      <div class="control-btn" id="propel-btn">PROPEL ENGINE</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('current-score');
    const uiOverlay = document.getElementById('ui-overlay');
    const actionBtn = document.getElementById('action-btn');
    const propelBtn = document.getElementById('propel-btn');
    const menuTitle = document.getElementById('menu-title');
    const menuDesc = document.getElementById('menu-desc');

    function resize() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let playing = false;
    let sub = {
      x: 70,
      y: 200,
      width: 40,
      height: 25,
      gravity: 0.35,
      lift: -0.7,
      velocity: 0
    };
    let obstacles = [];
    let obstacleTimer = 0;
    let speed = 3;
    let isPropelling = false;

    function sendScoreToPortal(score) {
      if (window.parent) {
        window.parent.postMessage({
          type: 'GAME_SCORE',
          score: score,
          coinsEarned: score * 0.010
        }, '*');
      }
    }

    function init() {
      score = 0;
      obstacles = [];
      sub.y = canvas.height / 2;
      sub.velocity = 0;
      speed = 3;
      obstacleTimer = 0;
      scoreVal.textContent = '0';
    }

    // Controls
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        isPropelling = true;
      }
    });
    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        isPropelling = false;
      }
    });

    propelBtn.addEventListener('mousedown', () => isPropelling = true);
    propelBtn.addEventListener('mouseup', () => isPropelling = false);
    propelBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isPropelling = true; });
    propelBtn.addEventListener('touchend', (e) => { e.preventDefault(); isPropelling = false; });

    actionBtn.addEventListener('click', () => {
      init();
      playing = true;
      uiOverlay.classList.add('hidden');
      loop();
    });

    function gameOver() {
      playing = false;
      uiOverlay.classList.remove('hidden');
      menuTitle.textContent = "Hull Breached!";
      menuDesc.textContent = `Reached ${score}m deep (+${(score * 0.010).toFixed(2)} Coins)`;
      actionBtn.textContent = "Dive Again";
      sendScoreToPortal(score);
    }

    function spawnObstacle() {
      const topHeight = 50 + Math.random() * (canvas.height / 2.5);
      const gap = 110 + Math.random() * 30;
      obstacles.push({
        x: canvas.width,
        topHeight: topHeight,
        bottomHeight: canvas.height - topHeight - gap,
        width: 35,
        passed: false
      });
    }

    function loop() {
      if (!playing) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw active background water sparkles
      ctx.fillStyle = 'rgba(56, 189, 248, 0.03)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Submarine physics
      if (isPropelling) {
        sub.velocity += sub.lift;
      } else {
        sub.velocity += sub.gravity;
      }
      
      sub.y += sub.velocity;

      // Restrict boundaries
      if (sub.y < 0) { sub.y = 0; sub.velocity = 0; }
      if (sub.y > canvas.height - sub.height) {
        gameOver();
        return;
      }

      // Draw Submarine
      ctx.fillStyle = '#e0f2fe';
      ctx.shadowColor = '#38bdf8';
      ctx.shadowBlur = 12;
      // Main Body
      ctx.fillRect(sub.x, sub.y, sub.width, sub.height);
      // Scope
      ctx.fillRect(sub.x + 20, sub.y - 8, 6, 8);
      ctx.fillRect(sub.x + 26, sub.y - 8, 8, 3);
      // Propeller spinner animation
      ctx.fillStyle = '#fb7185';
      ctx.fillRect(sub.x - 8, sub.y + 6, 8, 12);

      // Spawn obstacles
      obstacleTimer++;
      if (obstacleTimer > 110) {
        spawnObstacle();
        obstacleTimer = 0;
      }

      // Obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.x -= speed;

        ctx.fillStyle = '#fb7185';
        ctx.shadowColor = '#fb7185';
        ctx.shadowBlur = 10;
        
        // Top block
        ctx.fillRect(obs.x, 0, obs.width, obs.topHeight);
        // Bottom block
        ctx.fillRect(obs.x, canvas.height - obs.bottomHeight, obs.width, obs.bottomHeight);

        // Crash check
        if (
          sub.x < obs.x + obs.width &&
          sub.x + sub.width > obs.x &&
          (sub.y < obs.topHeight || sub.y + sub.height > canvas.height - obs.bottomHeight)
        ) {
          gameOver();
          return;
        }

        if (obs.x + obs.width < sub.x && !obs.passed) {
          obs.passed = true;
          score += 10;
          scoreVal.textContent = score;
          if (score % 60 === 0) speed += 0.5;
        }

        if (obs.x < -40) {
          obstacles.splice(i, 1);
        }
      }

      ctx.shadowBlur = 0;
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
