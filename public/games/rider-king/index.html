<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rider King - Neon Synthwave</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background-color: #030303;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-col: column;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 800px;
      background: linear-gradient(180deg, #090014 0%, #020005 100%);
      border: 2px solid #00f0ff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 15px;
      text-align: center;
      border-b: 1px solid rgba(0, 240, 255, 0.2);
      background: rgba(0, 240, 255, 0.05);
    }
    h1 {
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #00f0ff;
      text-shadow: 0 0 10px #00f0ff;
    }
    #canvas-container {
      flex: 1;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }
    #ui-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(3, 3, 3, 0.85);
      z-index: 10;
      transition: opacity 0.3s;
    }
    .hidden {
      display: none !important;
    }
    button {
      background: linear-gradient(135deg, #00f0ff 0%, #ff007f 100%);
      color: #000;
      border: none;
      padding: 12px 35px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
      transition: transform 0.1s, box-shadow 0.1s;
      margin-top: 20px;
    }
    button:active {
      transform: scale(0.95);
      box-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
    }
    #score-board {
      font-size: 14px;
      color: #ff007f;
      text-shadow: 0 0 8px #ff007f;
      margin-top: 10px;
    }
    #instructions {
      font-size: 12px;
      color: #888;
      margin-top: 15px;
      text-align: center;
      padding: 0 20px;
      line-height: 1.5;
    }
    #mobile-controls {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
      border-top: 1px solid rgba(255, 0, 127, 0.2);
    }
    .control-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid #00f0ff;
      color: #00f0ff;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
    }
    .control-btn:active {
      background: #00f0ff;
      color: #000;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <header>
      <h1>RIDER KING</h1>
      <div id="score-board">SCORE: <span id="current-score">0</span></div>
    </header>

    <div id="canvas-container">
      <canvas id="gameCanvas"></canvas>

      <div id="ui-overlay">
        <h2 id="menu-title" style="color: #ff007f; text-shadow: 0 0 10px #ff007f; text-transform: uppercase; letter-spacing: 2px;">Start Ride</h2>
        <p id="menu-desc" style="font-size: 12px; margin-top: 10px; color: #aaa;">Dodge the barriers and collect points!</p>
        <button id="action-btn">Ride Now</button>
        <p id="instructions">Press [SPACE] or tap the UP arrow button on screen to hop over incoming hazard blocks.</p>
      </div>
    </div>

    <div id="mobile-controls">
      <div class="control-btn" id="hop-btn">▲</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('current-score');
    const uiOverlay = document.getElementById('ui-overlay');
    const actionBtn = document.getElementById('action-btn');
    const hopBtn = document.getElementById('hop-btn');
    const menuTitle = document.getElementById('menu-title');
    const menuDesc = document.getElementById('menu-desc');

    // Canvas sizing
    function resize() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Game state
    let score = 0;
    let playing = false;
    let bike = {
      x: 50,
      y: 0,
      width: 30,
      height: 40,
      gravity: 0.6,
      lift: -12,
      velocity: 0,
      groundY: 0
    };
    let obstacles = [];
    let obstacleTimer = 0;
    let speed = 4;

    function sendScoreToPortal(score) {
      if (window.parent) {
        window.parent.postMessage({
          type: 'GAME_SCORE',
          score: score,
          coinsEarned: score * 0.010
        }, '*');
      }
    }

    function init() {
      score = 0;
      obstacles = [];
      bike.y = canvas.height - 100;
      bike.groundY = canvas.height - 100;
      bike.velocity = 0;
      speed = 4;
      obstacleTimer = 0;
      scoreVal.textContent = '0';
    }

    function jump() {
      if (bike.y >= bike.groundY - 5) {
        bike.velocity = bike.lift;
      }
    }

    // Controls
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (playing) jump();
        else startGame();
      }
    });

    hopBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      jump();
    });
    hopBtn.addEventListener('mousedown', jump);

    actionBtn.addEventListener('click', () => {
      startGame();
    });

    function startGame() {
      init();
      playing = true;
      uiOverlay.classList.add('hidden');
      loop();
    }

    function gameOver() {
      playing = false;
      uiOverlay.classList.remove('hidden');
      menuTitle.textContent = "Crashed!";
      menuDesc.textContent = `Earned ${score} points (+${(score * 0.010).toFixed(2)} Coins)`;
      actionBtn.textContent = "Ride Again";
      sendScoreToPortal(score);
    }

    function spawnObstacle() {
      const height = 30 + Math.random() * 40;
      obstacles.push({
        x: canvas.width,
        y: bike.groundY + bike.height - height,
        width: 20,
        height: height
      });
    }

    function loop() {
      if (!playing) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw Grid ground lines
      ctx.strokeStyle = '#22003c';
      ctx.lineWidth = 2;
      for (let i = 0; i < canvas.height; i += 40) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
      }

      // Draw active ground line
      ctx.strokeStyle = '#00f0ff';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, bike.groundY + bike.height);
      ctx.lineTo(canvas.width, bike.groundY + bike.height);
      ctx.stroke();

      // Bike physics
      bike.velocity += bike.gravity;
      bike.y += bike.velocity;

      if (bike.y > bike.groundY) {
        bike.y = bike.groundY;
        bike.velocity = 0;
      }

      // Draw Neon Bike
      ctx.fillStyle = '#ff007f';
      ctx.shadowColor = '#ff007f';
      ctx.shadowBlur = 15;
      ctx.fillRect(bike.x, bike.y, bike.width, bike.height);
      
      // Wheels
      ctx.fillStyle = '#00f0ff';
      ctx.shadowColor = '#00f0ff';
      ctx.beginPath();
      ctx.arc(bike.x + 5, bike.y + bike.height, 8, 0, Math.PI * 2);
      ctx.arc(bike.x + bike.width - 5, bike.y + bike.height, 8, 0, Math.PI * 2);
      ctx.fill();

      // Spawn obstacles
      obstacleTimer++;
      if (obstacleTimer > 90) {
        spawnObstacle();
        obstacleTimer = 0;
      }

      // Move & draw obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.x -= speed;

        ctx.fillStyle = '#00f0ff';
        ctx.shadowColor = '#00f0ff';
        ctx.shadowBlur = 10;
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

        // Check crash
        if (
          bike.x < obs.x + obs.width &&
          bike.x + bike.width > obs.x &&
          bike.y < obs.y + obs.height &&
          bike.y + bike.height > obs.y
        ) {
          gameOver();
          return;
        }

        // Score tracking
        if (obs.x + obs.width < bike.x && !obs.passed) {
          obs.passed = true;
          score += 10;
          scoreVal.textContent = score;
          if (score % 50 === 0) speed += 0.5;
        }

        if (obs.x < -40) {
          obstacles.splice(i, 1);
        }
      }

      // Clear shadow properties for performance
      ctx.shadowBlur = 0;

      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
