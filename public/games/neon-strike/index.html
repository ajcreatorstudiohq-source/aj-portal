<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Strike - AJ Space Blaster</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background-color: #030303;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 800px;
      background: linear-gradient(180deg, #020215 0%, #000003 100%);
      border: 2px solid #a855f7;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      background: rgba(168, 85, 247, 0.05);
    }
    h1 {
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #c084fc;
      text-shadow: 0 0 10px #c084fc;
    }
    #canvas-container {
      flex: 1;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(3, 3, 3, 0.85);
      z-index: 10;
    }
    .hidden {
      display: none !important;
    }
    button {
      background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
      color: #fff;
      border: none;
      padding: 12px 35px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
      margin-top: 20px;
    }
    button:active {
      transform: scale(0.95);
    }
    #score-board {
      font-size: 14px;
      color: #38bdf8;
      text-shadow: 0 0 8px #38bdf8;
      margin-top: 10px;
    }
    #instructions {
      font-size: 11px;
      color: #888;
      margin-top: 15px;
      text-align: center;
      padding: 0 20px;
      line-height: 1.5;
    }
    #mobile-controls {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
      border-top: 1px solid rgba(168, 85, 247, 0.2);
    }
    .control-btn {
      width: 70px;
      height: 60px;
      border-radius: 12px;
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid #a855f7;
      color: #a855f7;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .control-btn:active {
      background: #a855f7;
      color: #000;
    }
    #shoot-btn {
      width: 120px;
      background: rgba(236, 72, 153, 0.1);
      border: 1px solid #ec4899;
      color: #ec4899;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    #shoot-btn:active {
      background: #ec4899;
      color: #fff;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <header>
      <h1>NEON STRIKE</h1>
      <div id="score-board">SCORE: <span id="current-score">0</span></div>
    </header>

    <div id="canvas-container">
      <canvas id="gameCanvas"></canvas>

      <div id="ui-overlay">
        <h2 id="menu-title" style="color: #c084fc; text-shadow: 0 0 10px #c084fc; text-transform: uppercase; letter-spacing: 2px;">Battle Stations</h2>
        <p id="menu-desc" style="font-size: 12px; margin-top: 10px; color: #aaa;">Blast incoming cosmic anomalies!</p>
        <button id="action-btn">Strike Now</button>
        <p id="instructions">Use [A]/[D] or Left/Right arrows to move. Press [SPACE] or tap "BLAST" on screen to fire lasers.</p>
      </div>
    </div>

    <div id="mobile-controls">
      <div class="control-btn" id="left-btn">◀</div>
      <div class="control-btn" id="shoot-btn">BLAST</div>
      <div class="control-btn" id="right-btn">▶</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('current-score');
    const uiOverlay = document.getElementById('ui-overlay');
    const actionBtn = document.getElementById('action-btn');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');
    const shootBtn = document.getElementById('shoot-btn');
    const menuTitle = document.getElementById('menu-title');
    const menuDesc = document.getElementById('menu-desc');

    function resize() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let playing = false;
    let playerX = 150;
    const playerWidth = 40;
    const playerHeight = 30;
    let lasers = [];
    let invaders = [];
    let invaderTimer = 0;
    let invaderSpeed = 2;

    function sendScoreToPortal(score) {
      if (window.parent) {
        window.parent.postMessage({
          type: 'GAME_SCORE',
          score: score,
          coinsEarned: score * 0.010
        }, '*');
      }
    }

    function init() {
      score = 0;
      lasers = [];
      invaders = [];
      playerX = (canvas.width - playerWidth) / 2;
      invaderSpeed = 2;
      invaderTimer = 0;
      scoreVal.textContent = '0';
    }

    let leftPressed = false;
    let rightPressed = false;

    // Controls
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') leftPressed = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rightPressed = true;
      if (e.code === 'Space') {
        e.preventDefault();
        shoot();
      }
    });
    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') leftPressed = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rightPressed = false;
    });

    leftBtn.addEventListener('mousedown', () => leftPressed = true);
    leftBtn.addEventListener('mouseup', () => leftPressed = false);
    leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftPressed = true; });
    leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); leftPressed = false; });

    rightBtn.addEventListener('mousedown', () => rightPressed = true);
    rightBtn.addEventListener('mouseup', () => rightPressed = false);
    rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightPressed = true; });
    rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); rightPressed = false; });

    shootBtn.addEventListener('click', () => {
      shoot();
    });

    function shoot() {
      if (!playing) return;
      lasers.push({
        x: playerX + playerWidth / 2 - 2,
        y: canvas.height - 60,
        width: 4,
        height: 15
      });
    }

    actionBtn.addEventListener('click', () => {
      init();
      playing = true;
      uiOverlay.classList.add('hidden');
      loop();
    });

    function gameOver() {
      playing = false;
      uiOverlay.classList.remove('hidden');
      menuTitle.textContent = "Defeated!";
      menuDesc.textContent = `Vaporized anomalies score: ${score} (+${(score * 0.010).toFixed(2)} Coins)`;
      actionBtn.textContent = "Deploy Striker";
      sendScoreToPortal(score);
    }

    function spawnInvader() {
      const size = 25 + Math.random() * 20;
      const oX = 20 + Math.random() * (canvas.width - size - 40);
      invaders.push({
        x: oX,
        y: -50,
        width: size,
        height: size,
        health: Math.random() > 0.6 ? 2 : 1
      });
    }

    function loop() {
      if (!playing) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Move player
      if (leftPressed && playerX > 15) playerX -= 5;
      if (rightPressed && playerX < canvas.width - playerWidth - 15) playerX += 5;

      // Draw Starfield Background
      ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
      for (let i = 0; i < 15; i++) {
        let x = (Math.sin(i * 3141) + 1) * canvas.width / 2;
        let y = ((Date.now() / 10 + i * 150) % canvas.height);
        ctx.fillRect(x, y, 2, 2);
      }

      // Draw Player Ship (Neon Purplish Spaceship)
      ctx.fillStyle = '#ec4899';
      ctx.shadowColor = '#ec4899';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(playerX + playerWidth / 2, canvas.height - 70);
      ctx.lineTo(playerX + playerWidth, canvas.height - 40);
      ctx.lineTo(playerX, canvas.height - 40);
      ctx.closePath();
      ctx.fill();

      // Move & draw Lasers
      for (let i = lasers.length - 1; i >= 0; i--) {
        let laser = lasers[i];
        laser.y -= 7;

        ctx.fillStyle = '#38bdf8';
        ctx.shadowColor = '#38bdf8';
        ctx.shadowBlur = 10;
        ctx.fillRect(laser.x, laser.y, laser.width, laser.height);

        // Offscreen removal
        if (laser.y < -20) {
          lasers.splice(i, 1);
        }
      }

      // Spawn invaders
      invaderTimer++;
      if (invaderTimer > 50) {
        spawnInvader();
        invaderTimer = 0;
      }

      // Move & draw Invaders
      for (let i = invaders.length - 1; i >= 0; i--) {
        let inv = invaders[i];
        inv.y += invaderSpeed;

        ctx.fillStyle = inv.health > 1 ? '#a855f7' : '#c084fc';
        ctx.shadowColor = '#a855f7';
        ctx.shadowBlur = 10;
        ctx.fillRect(inv.x, inv.y, inv.width, inv.height);

        // Check if invader hit player
        if (
          playerX < inv.x + inv.width &&
          playerX + playerWidth > inv.x &&
          canvas.height - 70 < inv.y + inv.height &&
          canvas.height - 40 > inv.y
        ) {
          gameOver();
          return;
        }

        // Check if invader breached the base line
        if (inv.y > canvas.height - 40) {
          gameOver();
          return;
        }

        // Collision with lasers
        for (let j = lasers.length - 1; j >= 0; j--) {
          let l = lasers[j];
          if (
            l.x < inv.x + inv.width &&
            l.x + l.width > inv.x &&
            l.y < inv.y + inv.height &&
            l.y + l.height > inv.y
          ) {
            lasers.splice(j, 1);
            inv.health--;
            if (inv.health <= 0) {
              invaders.splice(i, 1);
              score += 10;
              scoreVal.textContent = score;
              if (score % 80 === 0) invaderSpeed += 0.3;
            }
            break;
          }
        }
      }

      ctx.shadowBlur = 0;
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
